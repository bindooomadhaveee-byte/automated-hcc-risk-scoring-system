<main class="main-content" id="mainContent">
  <header class="topbar">
    <div class="topbar-left">
      <h1 class="page-title">ICD-10 Mapper</h1>
      <p class="page-subtitle">Map ICD-10 diagnosis codes to HCC categories and calculate RAF weights</p>
    </div>
  </header>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">

    <!-- LOOKUP PANEL -->
    <div>
      <div class="card" style="margin-bottom:16px">
        <div class="card-header"><h2 class="card-title">Single Code Lookup</h2></div>
        <div style="display:flex;gap:8px">
          <input class="form-input" id="singleCode" placeholder="Enter ICD-10 code (e.g. E11.9)" style="flex:1"
            onkeydown="if(event.key==='Enter') lookupSingle()" />
          <button class="btn-primary" onclick="lookupSingle()">Look Up</button>
        </div>
        <div id="singleResult" style="margin-top:14px"></div>
      </div>

      <div class="card">
        <div class="card-header"><h2 class="card-title">Bulk Code Mapper</h2></div>
        <textarea class="form-textarea" id="bulkCodes" placeholder="Paste ICD-10 codes, one per line or comma-separated:&#10;E11.9&#10;I50.9&#10;J44.1, N18.3" style="min-height:120px"></textarea>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="btn-primary" onclick="bulkMap()">Map All Codes</button>
          <button class="btn-ghost" onclick="clearBulk()">Clear</button>
        </div>
        <div id="bulkResult" style="margin-top:14px"></div>
      </div>
    </div>

    <!-- HCC REFERENCE TABLE -->
    <div class="card" style="max-height:calc(100vh - 160px);overflow-y:auto">
      <div class="card-header">
        <h2 class="card-title">HCC Reference Table</h2>
        <input class="search-input" style="width:160px" id="hccSearch" placeholder="Search HCC..." oninput="renderHccRef()" />
      </div>
      <table class="data-table" id="hccRefTable">
        <thead><tr><th>HCC Code</th><th>Condition</th><th>RAF Weight</th></tr></thead>
        <tbody id="hccRefBody"></tbody>
      </table>
    </div>
  </div>
</main>

<div class="toast"></div>
<script src="../js/data.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  renderHccRef();
  document.getElementById('sidebarToggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('collapsed');
    document.getElementById('mainContent').classList.toggle('expanded');
  });
});

function lookupSingle() {
  const code = document.getElementById('singleCode').value.trim().toUpperCase();
  const res  = document.getElementById('singleResult');
  if (!code) { res.innerHTML=''; return; }
  const hcc = mapICD(code);
  if (!hcc) {
    res.innerHTML = `<div style="background:var(--red-dim);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--red)">
      ⚠ <strong>${code}</strong> is not mapped to any CMS-HCC v28 category in this system.
    </div>`;
    return;
  }
  const cat = HCC_CATEGORIES[hcc];
  const rafCol = cat.raf >= 0.5 ? '#ef4444' : cat.raf >= 0.25 ? '#f59e0b' : '#22c55e';
  res.innerHTML = `
    <div style="background:var(--blue-dim);border:1px solid rgba(59,130,246,.2);border-radius:10px;padding:16px 18px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div style="font-family:monospace;font-size:11px;color:var(--blue);margin-bottom:4px">${code}</div>
          <div style="font-size:15px;font-weight:500;color:var(--text)">${cat.desc}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:var(--text-muted)">HCC Category</div>
          <div style="font-family:monospace;font-size:14px;font-weight:600;color:var(--blue)">${hcc}</div>
        </div>
      </div>
      <div style="display:flex;gap:16px;font-size:13px">
        <div><span style="color:var(--text-muted)">RAF Weight: </span><span style="font-weight:600;color:${rafCol}">${cat.raf.toFixed(3)}</span></div>
        <div><span style="color:var(--text-muted)">Est. add cost: </span><span style="font-weight:500">${formatCurrency(cat.raf * 9800)}/yr</span></div>
      </div>
    </div>`;
}

function bulkMap() {
  const raw = document.getElementById('bulkCodes').value;
  const codes = raw.split(/[\n,]+/).map(s=>s.trim().toUpperCase()).filter(Boolean);
  if (!codes.length) { showToast('Enter at least one code'); return; }

  let totalRaf = 0;
  const mapped = [], unmapped = [];

  codes.forEach(code => {
    const hcc = mapICD(code);
    if (hcc) {
      const cat = HCC_CATEGORIES[hcc];
      totalRaf += cat.raf;
      mapped.push({ code, hcc, raf: cat.raf, desc: cat.desc });
    } else {
      unmapped.push(code);
    }
  });

  const rows = mapped.map(m => `
    <tr>
      <td class="mono" style="font-size:11px;color:var(--blue)">${m.code}</td>
      <td style="font-size:12px">${m.desc}</td>
      <td class="mono" style="font-size:11px">${m.hcc}</td>
      <td style="font-weight:500;color:var(--green)">${m.raf.toFixed(3)}</td>
    </tr>`).join('');

  document.getElementById('bulkResult').innerHTML = `
    <div style="background:var(--bg-3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px">
      <div style="display:flex;gap:24px;font-size:13px;margin-bottom:12px">
        <div><span style="color:var(--text-muted)">Codes mapped: </span><span style="font-weight:600;color:var(--green)">${mapped.length}</span></div>
        <div><span style="color:var(--text-muted)">Unmapped: </span><span style="font-weight:600;color:var(--red)">${unmapped.length}</span></div>
        <div><span style="color:var(--text-muted)">Total RAF (chronic): </span><span style="font-weight:700;color:var(--blue)">${totalRaf.toFixed(3)}</span></div>
      </div>
      <div style="overflow-x:auto">
        <table class="data-table">
          <thead><tr><th>ICD-10</th><th>HCC Condition</th><th>HCC Code</th><th>RAF Weight</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
    ${unmapped.length ? `<div style="font-size:12px;color:var(--red);background:var(--red-dim);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:10px 12px">
      Not mapped: ${unmapped.join(', ')}
    </div>` : ''}`;
}

function clearBulk() {
  document.getElementById('bulkCodes').value = '';
  document.getElementById('bulkResult').innerHTML = '';
}

function renderHccRef() {
  const q = (document.getElementById('hccSearch')?.value || '').toLowerCase();
  const entries = Object.entries(HCC_CATEGORIES)
    .filter(([k,v]) => !q || k.toLowerCase().includes(q) || v.desc.toLowerCase().includes(q));
  const rafColor = r => r>=0.5?'var(--red)':r>=0.25?'var(--amber)':'var(--green)';
  document.getElementById('hccRefBody').innerHTML = entries.map(([code,cat]) => `
    <tr>
      <td class="mono" style="font-size:11px;color:var(--blue)">${code}</td>
      <td style="font-size:12px">${cat.desc}</td>
      <td style="font-weight:500;color:${rafColor(cat.raf)};font-family:monospace;font-size:12px">${cat.raf.toFixed(3)}</td>
    </tr>`).join('');
}
</script>
</body>
</html>
